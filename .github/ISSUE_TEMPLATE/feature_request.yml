name: Feature request
description: Suggest a product, UX or engineering improvement / Propune o îmbunătățire de produs, UX sau engineering
labels: ['enhancement']
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / Context
      description: What user problem does this solve? / Ce problemă rezolvă?
      placeholder: As a user, I want...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution / Soluție propusă
      description: Describe the feature, flow or UI change.
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area / Secțiune
      options:
        - Dashboard
        - Clients
        - Tasks / Kanban
        - Reports
        - Calendar
        - Activity log
        - Settings
        - Accessibility
        - PWA / Offline
        - Architecture
        - Portfolio polish
        - Other
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      placeholder: |
        - [ ] ...
        - [ ] ...

  - type: textarea
    id: tradeoffs
    attributes:
      label: Trade-offs / Notes
      description: Mention constraints, alternatives or follow-up work.
