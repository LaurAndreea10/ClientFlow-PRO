name: Bug report
description: Report something that is not working / Raportează ceva care nu funcționează
labels: ['bug']
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened? / Ce s-a întâmplat?
      description: A clear description of the bug / O descriere clară a problemei
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce / Pași de reproducere
      placeholder: |
        1. Go to...
        2. Click on...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior / Comportament așteptat
    validations:
      required: true

  - type: dropdown
    id: browser
    attributes:
      label: Browser
      options:
        - Chrome
        - Firefox
        - Safari
        - Edge
        - Mobile Chrome
        - Mobile Safari
        - Other
    validations:
      required: true

  - type: dropdown
    id: device
    attributes:
      label: Device / Dispozitiv
      options:
        - Desktop
        - Mobile
        - Tablet
    validations:
      required: true

  - type: textarea
    id: console
    attributes:
      label: Console errors / Erori în consolă
      render: shell
