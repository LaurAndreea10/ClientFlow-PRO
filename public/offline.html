<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#7c3aed" />
    <title>ClientFlow Pro · Offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #e5eefb;
        background: radial-gradient(circle at top left, rgba(139, 92, 246, 0.22), transparent 32%), #081120;
      }
      main {
        width: min(92vw, 520px);
        padding: 28px;
        border-radius: 28px;
        background: rgba(10, 18, 33, 0.92);
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.36);
      }
      .badge {
        display: inline-flex;
        border-radius: 999px;
        padding: 8px 12px;
        background: rgba(139, 92, 246, 0.16);
        color: #c4b5fd;
        font-size: 0.85rem;
      }
      h1 { margin: 18px 0 8px; font-size: 2.2rem; letter-spacing: -0.06em; }
      p { color: #94a3b8; line-height: 1.6; }
      a {
        display: inline-flex;
        margin-top: 16px;
        color: white;
        text-decoration: none;
        padding: 12px 16px;
        border-radius: 16px;
        background: linear-gradient(135deg, #8b5cf6, #7c3aed);
      }
    </style>
  </head>
  <body>
    <main>
      <span class="badge">Offline mode</span>
      <h1>You are offline</h1>
      <p>ClientFlow Pro keeps demo data locally in your browser. Reconnect to refresh assets or deploy updates, then return to the app.</p>
      <a href="./#/dashboard">Return to dashboard</a>
    </main>
  </body>
</html>
